<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>చెల్లింపు</title>

    <style>
        body {
            font-family: Arial;
            background: #f3e5f5;
            text-align: center;
            padding: 40px;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            max-width: 400px;
            margin: auto;
        }
        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background: #6a0dad;
            color: white;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="container">

<h2>జ్యోతిష్య నివేదిక</h2>

<p>₹5 చెల్లించండి</p>

<button id="pay-btn">₹5 చెల్లించండి</button>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
var options = {
    "key": "{{ key_id }}",
    "amount": {{ amount }},
    "currency": "INR",
    "name": "వేదిక్ ఆస్ట్రో సొల్యూషన్స్",
    "description": "జ్యోతిష్య నివేదిక",
    "order_id": "{{ order_id }}",

    "handler": function (response) {

        var form = document.createElement("form");
        form.method = "POST";
        form.action = "/results";

        var input = document.createElement("input");
        input.type = "hidden";
        input.name = "razorpay_payment_id";
        input.value = response.razorpay_payment_id;

        form.appendChild(input);
        document.body.appendChild(form);
        form.submit();
    }
};

var rzp = new Razorpay(options);

document.getElementById("pay-btn").onclick = function(e){
    rzp.open();
    e.preventDefault();
}
</script>

</body>
</html>
