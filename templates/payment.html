<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>చెల్లింపు ప్రక్రియ</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #fdfcf0; text-align: center; padding: 50px 20px; }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #6a0dad; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="box">
        <h3>మీ వివరాలు సేవ్ చేయబడ్డాయి</h3>
        <p>పేమెంట్ పేజీకి రిడైరెక్ట్ అవుతోంది...</p>
        <div class="loader"></div>
        <p>దయచేసి వేచి ఉండండి.</p>
    </div>
</body>
</html>
