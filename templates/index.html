<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>వేదిక్ ఆస్ట్రో సొల్యూషన్స్</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f4f9; text-align: center; padding: 20px; }
        .container { background: white; max-width: 400px; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        h2 { color: #6a0dad; margin-bottom: 5px; }
        label { display: block; margin-top: 15px; font-weight: bold; text-align: left; }
        input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; font-family: inherit; }
        button { background-color: #6a0dad; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; margin-top: 25px; font-size: 18px; font-weight: bold; cursor: pointer; font-family: inherit; }
        button:hover { background-color: #7e22ce; }
        .footer { margin-top: 20px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h2>వేదిక్ ఆస్ట్రో సొల్యూషన్స్</h2>
    <p>మీ జ్యోతిష్య వివరాలను ఇక్కడ తెలుసుకోండి</p>

    <form action="/calculate" method="POST">

        <label>పేరు:</label>
        <input type="text" name="name"
               placeholder="మీ పేరు నమోదు చేయండి" required>

        <label>పుట్టిన తేదీ:</label>
        <input type="date" name="dob" required>

        <label>పుట్టిన సమయం:</label>
        <input type="time" name="tob" required>

        <label>పుట్టిన ప్రాంతం (సమీప పట్టణం):</label>
        <input list="city-list" name="city"
               placeholder="నగరం పేరు టైప్ చేయండి..." required>
        <datalist id="city-list">
            {% for city in cities %}
            <option value="{{ city }}">
            {% endfor %}
        </datalist>

        <button type="submit">వివరాలు పొందండి (₹1)</button>
    </form>

    <div class="footer">
        © 2026 వేదిక్ ఆస్ట్రో సొల్యూషన్స్ | ప్రొఫెసర్ నారాయణ బాబు<br>
        సంప్రదించండి: +91 8985368696
    </div>
</div>

</body>
</html>
