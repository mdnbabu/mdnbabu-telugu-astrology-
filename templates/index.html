<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>వేదిక్ ఆస్ట్రో సొల్యూషన్స్</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f4f9; text-align: center; padding: 20px; }
        .container { background: white; max-width: 400px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #6a0dad; }
        label { display: block; margin-top: 15px; font-weight: bold; text-align: left; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #6a0dad; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; margin-top: 20px; font-size: 16px; cursor: pointer; }
        .footer { margin-top: 20px; font-size: 12px; color: #777; }
    </style>
</head>
<body>

<div class="container">
    <h2>వేదిక్ ఆస్ట్రో సొల్యూషన్స్</h2>
    <p>మీ జ్యోతిష్య వివరాలను ఇక్కడ తెలుసుకోండి</p>
    
    <form action="/calculate" method="POST">
        <label>పేరు:</label>
        <input type="text" name="name" placeholder="మీ పేరు నమోదు చేయండి" required>

        <label>పుట్టిన తేదీ:</label>
        <input type="date" name="dob" required>

        <label>పుట్టిన సమయం:</label>
        <input type="time" name="tob" required>

        <label>పుట్టిన ప్రాంతం:</label>
        <input type="text" name="city" placeholder="ఉదా: విజయవాడ" required>

        <button type="submit">వివరాలు పొందండి (₹11)</button>
    </form>

    <div class="footer">
        © 2026 వేదిక్ ఆస్ట్రో సొల్యూషన్స్ | రిజిస్టర్డ్ సర్వీస్
    </div>
</div>

</body>
</html>
